apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhooksclient
  namespace: eshop
  labels:
    app: webhooksclient
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhooksclient
  template:
    metadata:
      labels:
        app: webhooksclient
    spec:
      containers:
        - name: webhooksclient
          image: foriinji/webhooksclient:v1
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: CallBackUrl
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: WebhooksCallBackUrl
          envFrom:
            - configMapRef:
                name: eshop-config
---
apiVersion: v1
kind: Service
metadata:
  name: webhooksclient
  namespace: eshop
spec:
  selector:
    app: webhooksclient
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: webhooksclient
  namespace: eshop
spec:
  to:
    kind: Service
    name: webhooksclient
  port:
    targetPort: 8080
