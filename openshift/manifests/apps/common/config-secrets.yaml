apiVersion: v1
kind: ConfigMap
metadata:
  name: eshop-config
  namespace: eshop
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  IdentityUrl: "http://identity-api:8080"
  Identity__Url: "http://identity-api:8080"
  IdentityUrlExternal: "http://identity-api-eshop.apps-crc.testing"
  WebAppClient: "http://webapp-eshop.apps-crc.testing"
  WebhooksWebClient: "http://webhooksclient-eshop.apps-crc.testing"
  CallBackUrl: "http://webapp-eshop.apps-crc.testing"
  WebhooksCallBackUrl: "http://webhooksclient-eshop.apps-crc.testing"
  services__catalog-api__http__0: "http://catalog-api:8080"
  services__basket-api__http__0: "http://basket-api:8080"
  services__ordering-api__http__0: "http://ordering-api:8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: eshop-secrets
  namespace: eshop
type: Opaque
stringData:
  # Base64 dönüşümünü OpenShift stringData sayesinde otomatik yapacak
  IdentityDbConnection: "Host=postgres;Database=identitydb;Username=postgres;Password=postgres"
  CatalogDbConnection: "Host=postgres;Database=catalogdb;Username=postgres;Password=postgres"
  OrderingDbConnection: "Host=postgres;Database=orderingdb;Username=postgres;Password=postgres"
  WebhooksDbConnection: "Host=postgres;Database=webhooksdb;Username=postgres;Password=postgres"
  EventBusConnection: "amqp://guest:guest@rabbitmq:5672"
  RedisConnection: "redis:6379"
