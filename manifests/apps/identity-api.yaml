apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "eshop-role"
        vault.hashicorp.com/agent-inject-secret-identity-api: "secret/eshop/identity-api"
        # Şifreleri .env formatında dosyaya yazar
        vault.hashicorp.com/agent-inject-template-identity-api: |
          {{- with secret "secret/eshop/identity-api" -}}
          {{- range $k, $v := .Data.data -}}
          export {{ $k }}="{{ $v }}"
          {{- end -}}
          {{- end -}}
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: identity-api
          image: git.local:3000/gitea/identity-api:latest
          imagePullPolicy: Always
          # Vault'tan gelen şifreleri (.env formatında) yükler ve uygulamayı başlatır
          command: ["/bin/sh", "-c"]
          args:
            [". /vault/secrets/identity-api && exec dotnet Identity.API.dll"]
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            # [VAULT] ConnectionStrings__identitydb buradaki env listesinden kaldırıldı, Vault'tan gelecek.
            - name: WebAppClient
              value: http://eshop.local
            - name: IssuerUri
              value: http://identity.local
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            # Proxy'den gelen her türlü Header'a güven (Kubernetes iç ağ güvenliği için)
            - name: ASPNETCORE_FORWARDEDHEADERS_ALLOWEDNETWORKS
              value: "0.0.0.0/0"
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-api
  namespace: default
spec:
  selector:
    app: identity-api
  ports:
    - port: 8080
      targetPort: 8080
