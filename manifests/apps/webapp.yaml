apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "eshop-role"
        vault.hashicorp.com/agent-inject-secret-webapp: "secret/eshop/webapp"
        # Şifreleri .env formatında dosyaya yazar
        vault.hashicorp.com/agent-inject-template-webapp: |
          {{- with secret "secret/eshop/webapp" -}}
          {{- range $k, $v := .Data.data -}}
          export {{ $k }}="{{ $v }}"
          {{- end -}}
          {{- end -}}
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: webapp
          image: git.local:3000/gitea/webapp:latest
          imagePullPolicy: Always
          # Vault'tan gelen şifreleri (.env formatında) yükler ve uygulamayı başlatır
          command: ["/bin/sh", "-c"]
          args: [". /vault/secrets/webapp && exec dotnet WebApp.dll"]
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: IdentityUrl
              value: http://identity-api:8080
            - name: IdentityUrlExternal
              value: http://identity.local
            - name: CallBackUrl
              value: http://eshop.local
            - name: services__catalog-api__http__0
              value: http://catalog-api:8080
            - name: services__basket-api__http__0
              value: http://basket-api:8080
            - name: services__ordering-api__http__0
              value: http://ordering-api:8080
            # [VAULT] ConnectionStrings__eventbus buradaki env listesinden kaldırıldı, Vault'tan gelecek.
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            - name: ASPNETCORE_FORWARDEDHEADERS_ALLOWEDNETWORKS
              value: "0.0.0.0/0"
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: default
spec:
  selector:
    app: webapp
  ports:
    - port: 8080
      targetPort: 8080
