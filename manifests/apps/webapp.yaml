apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: webapp
          image: git.local:3000/gitea/webapp:latest
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: IdentityUrl
              value: http://identity-api:8080
            - name: IdentityUrlExternal
              value: http://identity.local
            - name: CallBackUrl
              value: http://eshop.local
            - name: services__catalog-api__http__0
              value: http://catalog-api:8080
            - name: services__basket-api__http__0
              value: http://basket-api:8080
            - name: services__ordering-api__http__0
              value: http://ordering-api:8080
            - name: ConnectionStrings__eventbus
              value: amqp://guest:guest@rabbitmq:5672
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: default
spec:
  selector:
    app: webapp
  ports:
    - port: 8080
      targetPort: 8080
