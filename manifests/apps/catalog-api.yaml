apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: catalog-api
          image: git.local:3000/gitea/catalog-api:latest
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ConnectionStrings__catalogdb
              value: Host=postgres;Database=catalogdb;Username=postgres;Password=postgres
            - name: ConnectionStrings__eventbus
              value: amqp://guest:guest@rabbitmq:5672
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
  namespace: default
spec:
  selector:
    app: catalog-api
  ports:
    - port: 8080
      targetPort: 8080
