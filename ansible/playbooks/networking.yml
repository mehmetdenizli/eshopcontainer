---
- name: Networking ve LoadBalancer Yapılandırması
  hosts: k3s_master
  become: true
  vars:
    metallb_chart_version: "0.14.9"
    ip_range: "192.168.2.100-192.168.2.110"
    kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"

  tasks:
    - name: Helm Yüklü mü Kontrol Et
      command: helm version
      register: helm_check
      ignore_errors: true

    - name: Helm Kurulmamışsa Kur
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_check.failed

    - name: MetalLB Helm Reposunu Ekle
      command: helm repo add metallb https://metallb.github.io/metallb
      register: repo_add
      changed_when: "'already exists' not in repo_add.stdout"

    - name: Helm Repolarını Güncelle
      command: helm repo update

    - name: MetalLB Namespace Oluştur
      shell: "KUBECONFIG={{ kubeconfig_path }} kubectl create namespace metallb-system"
      ignore_errors: true

    - name: MetalLB Kurulumu (Helm)
      shell: |
        KUBECONFIG={{ kubeconfig_path }} helm upgrade --install metallb metallb/metallb \
        --namespace metallb-system \
        --version {{ metallb_chart_version }} \
        --wait

    - name: MetalLB IP Havuzu ve L2 Advertisement Hazırla
      copy:
        dest: "/tmp/{{ item.name }}"
        content: "{{ item.content }}"
      loop:
        - name: ip-pool.yaml
          content: |
            apiVersion: metallb.io/v1beta1
            kind: IPAddressPool
            metadata:
              name: first-pool
              namespace: metallb-system
            spec:
              addresses:
              - {{ ip_range }}
        - name: l2-adv.yaml
          content: |
            apiVersion: metallb.io/v1beta1
            kind: L2Advertisement
            metadata:
              name: l2-adv
              namespace: metallb-system
            spec:
              ipAddressPools:
              - first-pool

    - name: MetalLB Yapılandırmasını Uygula
      shell: "KUBECONFIG={{ kubeconfig_path }} kubectl apply -f /tmp/{{ item }}"
      loop:
        - ip-pool.yaml
        - l2-adv.yaml
      register: config_apply
      until: config_apply.rc == 0
      retries: 10
      delay: 5
